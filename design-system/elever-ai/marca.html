<!-- @dsCard group="Elever AI" -->
<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1350px;background:#F4F2FB;font-family:'Archivo',sans-serif;}
.card{position:relative;width:1080px;height:1350px;background:radial-gradient(120% 80% at 72% 22%, #ece7fb 0%, #F4F2FB 58%);overflow:hidden;}
.tab{position:absolute;top:0;left:60px;width:72px;height:224px;background:linear-gradient(155deg,#9A4DFF 0%,#2A1CA8 100%);border-radius:0 0 20px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.tab .ic{display:flex;align-items:center;justify-content:center;}
.tab .ic svg{width:46px;height:46px;}
.tab .vt{writing-mode:vertical-rl;transform:rotate(180deg);color:#fff;font-weight:800;font-size:18px;letter-spacing:2px;}
.spec{position:absolute;top:24px;right:24px;text-align:right;font-size:15px;color:#6B6680;font-family:monospace;line-height:1.5;}
.spec b{color:#8B3CF7;}
.ct{position:absolute;inset:0;display:flex;flex-direction:column;padding:64px 64px 132px;}
.fill{flex:1;}
.chip{display:flex;align-items:center;gap:16px;margin-bottom:28px;}
.chip .av{width:64px;height:64px;border-radius:16px;background:linear-gradient(155deg,#9A4DFF 0%,#2A1CA8 100%);display:flex;align-items:center;justify-content:center;}
.chip .hd{color:#100D1C;font-weight:800;font-size:36px;letter-spacing:-1px;}
.chip .hd .ai{color:#8B3CF7;}
.chip .ck{width:32px;height:32px;border-radius:50%;background:linear-gradient(155deg,#9A4DFF 0%,#2A1CA8 100%);color:#fff;font-size:19px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.h{font-family:'Anton';text-transform:uppercase;color:#100D1C;font-size:96px;line-height:.92;letter-spacing:1px;}
.h .v{color:#8B3CF7;}
.sub{color:#4A4560;font-size:32px;line-height:1.3;margin-top:26px;max-width:92%;}
.footer{position:absolute;bottom:34px;left:64px;right:64px;display:flex;justify-content:space-between;align-items:center;font-size:22px;color:#6B6680;letter-spacing:1px;border-top:1px solid rgba(0,0,0,.12);padding-top:18px;}
.footer .c{color:#8B3CF7;font-weight:700;}
</style></head><body>
<div class="card">
  <div class="spec">Elever AI · produto<br>símbolo <b>SPARKLE</b> · wordmark <b>Elever AI</b><br>gradiente roxo→azul · acento #8B3CF7<br>@eleverai · com selo</div>
  <div class="tab"><div class="ic"><svg viewBox="0 0 100 100" width="50" height="50"><path fill="#fff" d="M50 4 C54 34 66 46 96 50 C66 54 54 66 50 96 C46 66 34 54 4 50 C34 46 46 34 50 4 Z"/></svg></div><div class="vt">ELEVER</div></div>
  <div class="ct">
    <div class="fill"></div>
    <div class="chip"><div class="av"><svg viewBox="0 0 100 100" width="46" height="46"><path fill="#fff" d="M50 4 C54 34 66 46 96 50 C66 54 54 66 50 96 C46 66 34 54 4 50 C34 46 46 34 50 4 Z"/></svg></div><div class="hd">Elever<span class="ai"> AI</span></div><div class="ck">&#10003;</div></div>
    <div class="h">UM VENDEDOR NO WHATSAPP QUE <span class="v">NUNCA DORME.</span></div>
    <div class="sub">Atende todo cliente na hora — pelo preço de um estagiário.</div>
  </div>
  <div class="footer"><div>@eleverai</div><div>@copywriting2026</div></div>
</div>
</body></html>
