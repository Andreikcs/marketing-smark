oriatecnologica #inteligenciaartificial #automação #gestão #eficiência #tecnologia", "drive": "", "alt": "", "arquivo": "marcas/smark/publicacoes/social/instagram/2026-06-11-assessoria-tec-escalar.md"}, {"tipo": "post", "marca": "smark", "canal": "instagram", "formato": "post", "status": "draft", "data": "2026-06-11", "gerada": "2026-06-11", "tema": "O Claude é melhor que o GPT", "thumb": "marcas/smark/publicacoes/social/instagram/arte/claude-melhor-que-gpt.png", "legenda_ig": "\"O Claude é melhor que o GPT.\" Pronto, falamos.\n\nMas calma — não é torcida. Na smark, a gente testa os modelos de IA na prática, em operação real. E pra muita coisa (código, contexto longo, escrita, raciocínio honesto), o Claude entrega melhor.\n\nPra outras, o GPT ganha. E tem caso em que a melhor IA é… nenhuma — é uma automação simples.\n\nO ponto não é qual é o \"melhor do mundo\". É qual resolve a SUA operação.\n\nA gente escolhe a ferramenta certa pra cada caso. Tecnologia que deixa marco não escolhe hype — escolhe resultado.\n\nQual você usa hoje? Conta aí. 👇", "legenda_li": "", "hashtags": "#claude #chatgpt #inteligenciaartificial #IA #tecnologia #automação", "drive": "", "alt": "", "arquivo": "marcas/smark/publicacoes/social/instagram/2026-06-11-claude-melhor-que-gpt.md"}, {"tipo": "post", "marca": "provider-max", "canal": "instagram", "formato": "post", "status": "draft", "data": "2026-06-10", "gerada": "2026-06-10", "tema": "Contrato vencido vira cancelamento", "thumb": "marcas/provider-max/publicacoes/social/instagram/arte/contratos-vencidos-churn.png", "legenda_ig": "23% da sua base pode estar com contrato vencido agora. *(troque pelo seu número real)*\n\nContrato vencido não dá alarme. Ele só vira cancelamento — geralmente quando o concorrente liga primeiro.\n\nRenovação não é sorte. É processo: saber quem vence, quando, e agir antes.\n\nA Provider Max acompanha sua base, antecipa o vencimento e dispara a renovação com método e escala — integrado ao seu sistema.\n\nO dinheiro ial/instagram/arte/ia-substitui-humanos.png", "legenda_ig": "\"A IA vai substituir os humanos?\"\n\nPergunta errada.\n\nA IA não substitui humanos. Substitui tarefas — as repetíveis, as de copiar-e-colar, o \"trabalho de robô\" que seu time bom e caro faz todo dia.\n\nQuem só faz isso, sim, está em risco. Quem usa o tempo livre pra decidir, criar e cuidar do cliente, fica mais forte.\n\nA pergunta certa não é \"a IA vai me substituir\". É \"o que do meu trabalho já é trabalho de máquina — e por que ainda sou eu fazendo?\".\n\nConta a dor. A gente automatiza o que é de robô e devolve o tempo pro que é humano.", "legenda_li": "", "hashtags": "#inteligenciaartificial #futurodotrabalho #automação #gestão #produtividade #IAnasempresas", "drive": "", "alt": "", "arquivo": "marcas/smark/publicacoes/social/instagram/2026-06-10-ia-substitui-humanos.md"}, {"tipo": "post", "marca": "smark", "canal": "instagram", "formato": "post", "status": "draft", "data": "2026-06-10", "gerada": "2026-06-10", "tema": "Sistemas agênticos em 2028", "thumb": "marcas/smark/publicacoes/social/instagram/arte/sistemas-agenticos-2028.png", "legenda_ig": "Todo mundo vai falar de \"sistemas agênticos\" em 2028. Pouca gente vai saber o que fazer com eles.\n\nA real: agente não é robô que substitui seu time. É operação que se resolve sozinha nos casos que variam — com gente supervisionando.\n\nO risco não é a IA. É colocar agente onde uma automação simples bastava — ou esperar 2028 pra arrumar um processo que já está quebrado hoje.\n\n2028 não vai premiar quem tem mais IA. Vai premiar quem sabe operar.\n\nConta a dor. A gente implanta no que você já tem.", "legenda_li": "", "hashtags": "#IA #sistemasagenticos #automação #operação #gestão #futurodotrabalho", "drive": "", "alt": "", "arquivo": "marcas/smark/publicacoes/social/instagram/2026-06-10-sistemas-agenticos-2028.md"}, {"tipo": "post", "marca": "smark", "canal": "instagram", "formato": "post", "status": "draft", "data": "2026-06-10", "gerada": "2026-06-10", "tema": "Agente de IA x Automação — qual você realmente precisa", "thumb": "marcas/smark/publicacoes/social/instagram/arte/agente-ia-vs-automacao.png", "legenda_ig": "\"Quero um agente de IA.\" A gente ouve isso toda semana.\n\nQuase sempre, a resposta honesta é: você não precisa de um — precisa de uma automação bem feita.\n\nA diferença é simples:\n→ **Automação** segue uma regra fixa. \"Quando entra um pedido, cria o registro e avisa o time.\" Ela não pensa, ela executa. É barata e previsível.\n→ **Agente de IA** decide. Lê um caso que varia, interpreta e escolhe o caminho. Resolve o que regra fixa não dá conta — mas custa mais e precisa de supervisão.\n\nA régua: se a tarefa é sempre do mesmo jeito (copiar dado, montar relatório, atualizar planilha), é automação. Se exige interpretar cada caso, aí sim entra agente.\n\nO erro que mais custa caro é botar um agente de IA onde uma automação simples já resolvia. Tecnologia cara não é sinônimo de tecnologia certa.\n\nConta a dor. A gente olha sua operação e te diz qual é qual — e constrói no que você já tem.", "legenda_li": "", "hashtags": "#automação #inteligenciaartificial #agentesdeIA #gestão #operação #tecnologianaempresa", "drive": "", "alt": "", "arquivo": "marcas/smark/publicacoes/social/instagram/2026-06-10-agente-ia-vs-automacao.md"}];
const NOME={"smark":"smark","provider-max":"Provider Max","elever-ai":"Elever AI"};
const HANDLE={"smark":"@smark","provider-max":"@providermax","elever-ai":"@eleverai"};
let fMarca="",fCanal="",fStatus="",q="";
const IG='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>';
const LI='<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM10 9h3.8v1.7h.05c.53-1 1.83-2.05 3.77-2.05 4.03 0 4.78 2.65 4.78 6.1V21h-4v-5.4c0-1.3 0-2.95-1.8-2.95-1.8 0-2.08 1.4-2.08 2.85V21h-4z"/></svg>';
function canalIcon(c){if(c==="instagram")return IG+' Instagram';if(c==="linkedin")return LI+' LinkedIn';return c;}
function uniq(k){return [...new Set(DADOS.map(d=>d[k]).filter(Boolean))];}
function mkChips(id,vals,cur,set){const el=document.getElementById(id);el.innerHTML="";
  [["","todos"]].concat(vals.map(v=>[v,NOME[v]||v])).forEach(([v,label])=>{
    const c=document.createElement("span");c.className="chip"+(cur()===v?" on":"");
    c.innerHTML=(id==="fcanal"?canalIcon(v)||label:label);if(!v)c.textContent=label;
    c.onclick=()=>{set(v);renderChips();render();};el.appendChild(c);});}
function renderChips(){mkChips("fmarca",uniq("marca"),()=>fMarca,v=>fMarca=v);
  mkChips("fcanal",uniq("canal"),()=>fCanal,v=>fCanal=v);mkChips("fstatus",uniq("status"),()=>fStatus,v=>fStatus=v);}
function stCls(s){return "st-"+(s||"draft");}
function trunc(t,n){t=(t||"").trim();return t.length>n?t.slice(0,n)+"… ":t+" ";}
function render(){const g=document.getElementById("grid");g.innerHTML="";
  const list=DADOS.filter(d=>(!fMarca||d.marca===fMarca)&&(!fCanal||d.canal===fCanal)&&(!fStatus||d.status===fStatus)&&(!q||JSON.stringify(d).toLowerCase().includes(q)));
  if(!list.length){g.innerHTML='<div class="empty">Nada encontrado.</div>';return;}
  list.forEach(d=>{const c=document.createElement("div");c.className="card";c.onclick=()=>abrir(d);
    const th=d.thumb?`<div class="thumb" style="background-image:url('${encodeURI(d.thumb)}')"></div>`:`<div class="thumb">sem imagem</div>`;
    c.innerHTML=th+`<div class="b"><div class="tt">${d.tema||"(sem título)"}</div><div class="tags">
      <span class="t marca">${NOME[d.marca]||d.marca}</span>
      <span class="t canal" title="${d.canal}">${canalIcon(d.canal)}</span>
      <span class="t st ${stCls(d.status)}">${d.status}</span></div>
      <div class="dt">${d.tipo==="post"?"📝 post":"🖼️ arte"} · ${d.data}</div></div>`;
    g.appendChild(c);});}
function mockup(d){
  const h=HANDLE[d.marca]||"@marca", img=d.thumb?`style="background-image:url('${encodeURI(d.thumb)}')"`:"";
  if(d.canal==="linkedin"){
    const cap=d.legenda_li||d.legenda_ig||"(sem legenda — gere a copy)";
    return `<div class="mock li"><div class="hd"><div class="av">in</div><div><div class="nm">${NOME[d.marca]||d.marca}</div><div class="sub">uma plataforma smark · 2h · 🌐</div></div></div>
      <div class="txt">${trunc(cap,160)}<span class="more">…ver mais</span></div><div class="img" ${img}></div>
      <div class="react">👍❤️ 84 · 12 comentários · 5 compart.</div></div>`;}
  const cap=d.legenda_ig||"(sem legenda — gere a copy)";
  return `<div class="mock ig"><div class="hd"><div class="av">✦</div><div class="nm">${h.replace('@','')}</div><div>•••</div></div>
    <div class="img" ${img}></div><div class="acts"><span>♡</span><span>💬</span><span>✈</span><span class="save">🔖</span></div>
    <div class="likes">128 curtidas</div><div class="cap"><b>${h.replace('@','')}</b> ${trunc(cap,120)}<span class="more">mais</span></div></div>`;}
function abrir(d){const m=document.getElementById("modal");
  const cap=(lab,v)=>v?`<div class="row"><div class="lab">${lab}</div><div class="cap">${v}</div></div>`:"";
  const dl=d.thumb?`<a class="dl" href="${encodeURI(d.thumb)}" download>⬇ Baixar imagem</a>`:"";
  m.innerHTML=`<div class="preview">${mockup(d)}</div><div class="side">
    <h2>${d.tema||"(sem título)"}</h2>
    <div class="tags"><span class="t marca">${NOME[d.marca]||d.marca}</span>
      <span class="t canal" title="${d.canal}">${canalIcon(d.canal)}</span>
      <span class="t st ${stCls(d.status)}">${d.status}</span></div>
    <div class="row"><div class="lab">Dados</div><div class="cap">canal: ${d.canal}
formato: ${d.formato||"—"}
data: ${d.data}   ·   gerada: ${d.gerada||"—"}
arquivo: ${d.arquivo}${d.alt?"\nalt: "+d.alt:""}</div></div>
    ${cap("Legenda · Instagram",d.legenda_ig)}${cap("Legenda · LinkedIn",d.legenda_li)}${cap("Hashtags",d.hashtags)}
    <div class="row">${dl}</div>${d.drive?`<div class="row"><div class="lab">Drive</div><div class="cap">${d.drive}</div></div>`:""}
  </div>`;document.getElementById("ov").classList.add("on");}
function fechar(){document.getElementById("ov").classList.remove("on");}
document.getElementById("ov").onclick=e=>{if(e.target.id==="ov")fechar();};
document.getElementById("q").oninput=e=>{q=e.target.value.toLowerCase();render();};
renderChips();render();
const op=new URLSearchParams(location.search).get("open");if(op!==null&&DADOS[op])abrir(DADOS[op]);
</script></body></html>
