<!doctype html><html lang=pt-BR><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1">
<title>smark · Super Editor</title>
<style>
:root{--bg:#0d0b13;--pan:#141019;--pan2:#1a1524;--line:#2a2338;--txt:#ece9f4;--sub:#9a92ad;--rox:#8b3cf7;--ok:#37c26b;--warn:#e0a020}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:200px 1fr 320px;grid-template-rows:52px 1fr;height:100vh}
header{grid-column:1/4;display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--line);background:var(--pan)}
header b{font-size:15px}header .tag{font-size:11px;color:var(--sub);border:1px solid var(--line);padding:2px 8px;border-radius:999px}
header .sp{flex:1}
#dirty{font-size:12px;color:var(--sub)} #dirty.yes{color:var(--warn)}
.side{border-right:1px solid var(--line);background:var(--pan);overflow:auto;padding:10px}
.side h4{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--sub);margin:6px 6px 10px}
.pitem{padding:10px 11px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--sub);border:1px solid transparent;margin-bottom:4px;line-height:1.3}
.pitem:hover{background:var(--pan2)} .pitem.on{background:var(--pan2);border-color:var(--rox);color:var(--txt)}
.pitem small{display:block;color:var(--sub);font-size:11px;margin-top:2px}
.main{display:flex;flex-direction:column;overflow:hidden;background:#0a0810}
.strip{display:flex;gap:8px;padding:12px 14px;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--pan)}
.th{flex:0 0 auto;width:74px;height:92px;border-radius:8px;overflow:hidden;border:2px solid var(--line);cursor:pointer;position:relative;background:#000}
.th.on{border-color:var(--rox);box-shadow:0 0 0 3px #8b3cf733}
.th img{width:100%;height:100%;object-fit:cover;display:block}
.th .n{position:absolute;top:3px;left:4px;font-size:10px;background:#000a;padding:1px 5px;border-radius:5px;color:#fff}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:18px;overflow:hidden}
.framebox{position:relative;box-shadow:0 20px 60px #000a;border-radius:4px;overflow:hidden;background:#111}
.framebox iframe{border:0;display:block;width:1080px;height:1350px;transform-origin:top left}
.ctrl{border-left:1px solid var(--line);background:var(--pan);overflow:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
.grp{background:var(--pan2);border:1px solid var(--line);border-radius:12px;padding:12px}
.grp h5{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--sub);margin-bottom:10px}
label{font-size:11px;color:var(--sub);display:block;margin:0 0 4px}
textarea,input[type=text]{width:100%;background:#0f0d17;border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:9px 10px;font-size:13px;font-family:inherit;resize:vertical}
textarea:focus,input:focus{outline:none;border-color:var(--rox)}
.hint{font-size:10px;color:var(--sub);margin-top:3px}
.seg{display:flex;gap:5px;flex-wrap:wrap}
.seg button{flex:1;min-width:60px;padding:8px 6px;border:1px solid var(--line);background:#15121e;color:var(--sub);border-radius:8px;cursor:pointer;font-size:12px}
.seg button.on{background:var(--rox);border-color:var(--rox);color:#fff;font-weight:600}
.row{display:flex;gap:8px;align-items:center}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt);cursor:pointer}
input[type=color]{width:44px;height:32px;border:1px solid var(--line);border-radius:8px;background:#0f0d17;cursor:pointer;padding:2px}
input[type=range]{width:100%;accent-color:var(--rox)}
.btn{border:1px solid var(--line);background:#1b1729;color:var(--txt);padding:10px 12px;border-radius:9px;cursor:pointer;font-size:13px;width:100%}
.btn:hover{border-color:var(--rox)} .btn.go{background:var(--rox);border-color:var(--rox);color:#fff;font-weight:600}
.btn.ai{background:#173a2a;border-color:#1f6b47;color:#a8f0c8} .btn:disabled{opacity:.45;cursor:wait}
.acts{display:flex;flex-direction:column;gap:8px}
.mini{font-size:11px;color:var(--sub)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1c1729;border:1px solid var(--rox);padding:11px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;z-index:99}
#toast.on{opacity:1}
.bgthumb{width:100%;height:70px;object-fit:cover;border-radius:8px;border:1px solid var(--line);margin-bottom:8px;background:#000}
.fmtbar{display:flex;gap:4px;margin-bottom:5px}
.fmtb{border:1px solid var(--line);background:#15121e;color:var(--sub);border-radius:6px;padding:3px 9px;font-size:12px;cursor:pointer}
.fmtb:hover{border-color:var(--rox);color:var(--txt)} .fmtb.b{font-weight:800} .fmtb.i{font-style:italic}
.fmtcol{width:26px;height:24px;padding:1px;border:1px solid var(--line);border-radius:6px;background:#15121e;cursor:pointer}
.newpost{width:100%;margin-top:10px;padding:10px;border:1px dashed var(--line);background:transparent;color:var(--sub);border-radius:10px;cursor:pointer;font-size:13px}
.newpost:hover{border-color:var(--rox);color:var(--txt)}
.pitem{display:flex;align-items:flex-start;gap:7px}
.pitem .cb{margin-top:3px;accent-color:var(--rox);flex:0 0 auto}
.pitem .ptxt{flex:1;min-width:0}
.sideacts{display:flex;gap:6px;margin-top:8px}
.sideacts button{flex:1;font-size:11px;border:1px solid var(--line);background:#15121e;color:var(--sub);border-radius:8px;padding:7px;cursor:pointer}
.sideacts button:hover{border-color:var(--rox);color:var(--txt)}
.sideacts .del:hover{border-color:#c0392b;color:#ff8a80}
.cardacts{display:flex;gap:6px;padding:0 14px 10px}
.cardacts button{flex:1;border:1px solid var(--line);background:#15121e;color:var(--sub);border-radius:8px;padding:7px;font-size:12px;cursor:pointer}
.cardacts button:hover{border-color:var(--rox);color:var(--txt)} .cardacts .del:hover{border-color:#c0392b;color:#ff8a80}
.regsel{width:100%;background:#0f0d17;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px;font-size:12px;margin-bottom:6px}
.igmodal{display:none;position:fixed;inset:0;background:#000b;z-index:200;align-items:center;justify-content:center;padding:20px}
.igcard{background:#fff;color:#111;width:392px;max-width:94vw;max-height:94vh;overflow:auto;border-radius:14px;padding:0 0 14px}
.ighead{display:flex;align-items:center;gap:9px;padding:11px 13px;font-size:14px}
.igav{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#8b3cf7,#5a28b4)}
.igmedia{position:relative;width:392px;max-width:94vw;height:490px;overflow:hidden;background:#111}
.igmedia iframe{border:0;width:1080px;height:1350px;transform:scale(.363);transform-origin:top left}
.ignav{position:absolute;top:50%;transform:translateY(-50%);z-index:2;background:#000000aa;color:#fff;border:0;width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer}
.ignav.l{left:8px}.ignav.r{right:8px}
.igdots{position:absolute;bottom:10px;left:0;right:0;display:flex;gap:5px;justify-content:center;z-index:2}
.igdot{width:6px;height:6px;border-radius:50%;background:#ffffff77}.igdot.on{background:#fff}
.igicons{display:flex;gap:14px;padding:10px 14px;font-size:20px}
.igcap{padding:0 14px;font-size:13px;line-height:1.4}
.igcard textarea{width:calc(100% - 28px);margin:0 14px;background:#f4f2f8;border:1px solid #ddd;border-radius:8px;color:#111;padding:9px;font-size:13px;font-family:inherit}
.igbtns{display:flex;gap:8px;padding:12px 14px 0}.igbtns .btn{color:#111;background:#eee;border-color:#ddd}.igbtns .btn.go{background:#8b3cf7;color:#fff;border-color:#8b3cf7}
.grp h5{cursor:pointer;user-select:none;display:flex;justify-content:space-between}
.grp h5::after{content:'▾';color:var(--sub)} .grp.collapsed h5::after{content:'▸'}
.grp.collapsed>*:not(h5){display:none}
.emobar{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.emob{border:1px solid var(--line);background:#15121e;border-radius:6px;padding:2px 6px;font-size:15px;cursor:pointer;line-height:1.2}
.emob:hover{border-color:var(--rox)}
.gallery{border-top:1px solid var(--line);background:var(--pan)}
.pitem small .stb{margin-left:6px}
.th{cursor:grab} .th.drag{opacity:.4}
</style></head>
<body>
<div class=app>
  <header>
    <b>smark · Super Editor</b><span class=tag>clique no texto da imagem pra editar ✏️</span>
    <a href="/" style="color:var(--sub);text-decoration:none;font-size:13px;margin-left:8px">☰ Menu</a>
    <a href="/painel" style="color:var(--sub);text-decoration:none;font-size:13px">Painel</a>
    <a href="/vitrine" style="color:var(--sub);text-decoration:none;font-size:13px">Vitrine</a>
    <a href="/config" style="color:var(--sub);text-decoration:none;font-size:13px">⚙ Config</a>
    <span class=sp></span>
    <span id=dirty>salvo</span>
    <button class="btn" style="width:auto" id=bsave>💾 Salvar</button>
  </header>

  <aside class=side><h4>Publicações</h4><div id=posts></div>
    <button class=newpost id=bnew>+ Novo post</button>
    <div class=sideacts><button id=bdup>⧉ Duplicar</button><button class=del id=bdelpost>🗑 Excluir sel.</button></div>
  </aside>

  <div class=main>
    <div class=stage><div class=framebox id=fbox><iframe id=pv></iframe></div></div>
    <div class=gallery>
      <div class=cardacts><button id=bmvl>◀ Mover</button><button id=baddc>＋ Adicionar card</button><button id=bsim>📱 Instagram</button><button class=del id=bdelc>🗑 Excluir card</button><button id=bmvr>Mover ▶</button></div>
      <div class=strip id=strip></div>
    </div>
  </div>

  <aside class=ctrl id=ctrl></aside>
</div>
<div id=igmodal class=igmodal></div>
<div id=toast></div>

<script>
const $=s=>document.querySelector(s);
const TOKEN="__EDITOR_TOKEN__";
const HJSON={'Content-Type':'application/json','X-Editor-Token':TOKEN};
let D=null, PI=0, FI=0, dirty=false, tmr=null, _lastTa=null;
function insEmoji(e){const ta=_lastTa;if(!ta){toast('Clique num campo de texto primeiro');return}
  const s=ta.selectionStart,v=ta.value;ta.value=v.slice(0,s)+e+v.slice(ta.selectionEnd);
  ta.focus();ta.selectionStart=ta.selectionEnd=s+e.length;ta.dispatchEvent(new Event('input'))}

const TIPOS=["manifesto","dor","provoca","educativo","antihype","prova","autoridade","diferencial","nucleo","cta"];

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('on'),2600)}
function setDirty(v){dirty=v;const e=$('#dirty');e.className=v?'yes':'';e.textContent=v?'● não salvo':'✓ salvo'}
function post(){return D.posts[PI]}
function frame(){return post().frames[FI]}

async function carregar(){D=await(await fetch('/dados')).json();renderPosts();
  const q=new URLSearchParams(location.search);let pi=parseInt(q.get('post'));
  if(isNaN(pi)||pi<0||pi>=D.posts.length)pi=0;sel(pi,0)}

function renderPosts(){
  const el=$('#posts');el.innerHTML='';
  D.posts.forEach((p,i)=>{
    const d=document.createElement('div');d.className='pitem'+(i===PI?' on':'');
    const st=(p.status==='salvo')?'<span class=stb style="color:var(--ok)">● salvo</span>':'<span class=stb style="color:var(--warn)">● rascunho</span>';
    const cb=document.createElement('input');cb.type='checkbox';cb.className='cb';cb.checked=SEL.has(i);
    cb.onclick=e=>{e.stopPropagation();cb.checked?SEL.add(i):SEL.delete(i)};
    const txt=document.createElement('div');txt.className='ptxt';
    txt.innerHTML='<b>'+(i+1)+'. '+p.titulo.split('—')[0].trim()+'</b><small>'+(p.marca||'smark')+' · '+p.frames.length+' frames '+st+'</small>';
    d.appendChild(cb);d.appendChild(txt);
    d.onclick=()=>sel(i,0);el.appendChild(d);
  });
}
async function dupPost(){
  const p=JSON.parse(JSON.stringify(post()));p.titulo=(p.titulo||'')+' (cópia)';
  p.slug=(p.slug||'post')+'-c'+Date.now().toString(36).slice(-4);p.status='rascunho';
  D.posts.splice(PI+1,0,p);SEL.clear();await salvar(true);await reload(PI+1,0);toast('Post duplicado');
}
async function delSelected(){
  const idx=SEL.size?[...SEL].sort((a,b)=>b-a):[PI];
  if(!confirm('Excluir '+idx.length+' publicação(ões)? (a arte no disco não é apagada)'))return;
  idx.forEach(i=>D.posts.splice(i,1));SEL.clear();
  if(!D.posts.length){toast('Precisa de ao menos 1 post');await novoPost();return}
  await salvar(true);await reload(Math.min(PI,D.posts.length-1),0);toast('Excluído(s)');
}
function renderStrip(){
  const el=$('#strip');el.innerHTML='';
  post().frames.forEach((f,i)=>{
    const d=document.createElement('div');d.className='th'+(i===FI?' on':'');
    const src=f.out?('/'+f.out+'?t='+(f._v||0)):'';
    d.innerHTML='<span class=n>'+(i+1)+'</span>'+(src?'<img src="'+src+'">':'');
    d.onclick=()=>sel(PI,i);
    d.draggable=true;
    d.ondragstart=e=>{e.dataTransfer.setData('i',i);d.classList.add('drag')};
    d.ondragend=()=>d.classList.remove('drag');
    d.ondragover=e=>e.preventDefault();
    d.ondrop=e=>{e.preventDefault();reorderFrame(+e.dataTransfer.getData('i'),i)};
    el.appendChild(d);
  });
}
async function reorderFrame(from,to){
  if(from===to||isNaN(from))return;const fr=post().frames;const[m]=fr.splice(from,1);fr.splice(to,0,m);
  await salvar(true);await reload(PI,to);toast('Reordenado');
}
function sel(pi,fi){PI=pi;FI=fi;renderPosts();renderStrip();renderCtrl();preview()}

function fld(label,val,onin,ph,rows,key){
  const t=rows?('<textarea rows='+rows+'>'+ (val||'') +'</textarea>'):('<input type=text value="'+(val||'').replace(/"/g,'&quot;')+'">');
  const w=document.createElement('div');w.innerHTML='<label>'+label+'</label>'+t;
  const inp=w.querySelector(rows?'textarea':'input');inp.oninput=()=>onin(inp.value);if(key)inp.id='fld_'+key;return w;
}
function richField(label,val,onin,key){
  const w=document.createElement('div');w.innerHTML='<label>'+label+'</label>';
  const bar=document.createElement('div');bar.className='fmtbar';
  const ta=document.createElement('textarea');ta.rows=3;ta.value=val||'';ta.oninput=()=>onin(ta.value);ta.onfocus=()=>_lastTa=ta;if(key)ta.id='fld_'+key;
  const wrap=(pre,suf)=>{const s=ta.selectionStart,e=ta.selectionEnd,v=ta.value,sel=v.slice(s,e)||'texto';
    ta.value=v.slice(0,s)+pre+sel+(suf||pre)+v.slice(e);ta.focus();
    ta.selectionStart=s+pre.length;ta.selectionEnd=s+pre.length+sel.length;onin(ta.value)};
  const ins=t=>{const s=ta.selectionStart,v=ta.value;ta.value=v.slice(0,s)+t+v.slice(ta.selectionEnd);
    ta.focus();ta.selectionStart=ta.selectionEnd=s+t.length;onin(ta.value)};
  [['↵ quebra','',()=>ins('|')],['★ acento','',()=>wrap('*')],['B','b',()=>wrap('**')],['I','i',()=>wrap('_')]]
   .forEach(([lb,cls,fn])=>{const b=document.createElement('button');b.type='button';b.className='fmtb '+cls;b.textContent=lb;b.onclick=fn;bar.appendChild(b)});
  const col=document.createElement('input');col.type='color';col.value='#8b3cf7';col.className='fmtcol';col.title='cor';
  const cbtn=document.createElement('button');cbtn.type='button';cbtn.className='fmtb';cbtn.textContent='🎨';cbtn.title='colorir seleção';
  cbtn.onclick=()=>wrap('{'+col.value+':','}');bar.appendChild(col);bar.appendChild(cbtn);
  w.appendChild(bar);w.appendChild(ta);return w;
}

function renderCtrl(){
  const f=frame(),c=$('#ctrl');c.innerHTML='';
  // TEXTO
  const g1=document.createElement('div');g1.className='grp';g1.innerHTML='<h5>Texto</h5>';
  g1.appendChild(richField('Headline (| quebra · *acento* · **negrito** · _itálico_)',f.headline,v=>{f.headline=v;change()},'headline'));
  g1.appendChild(richField('Apoio (sub)',f.sub,v=>{f.sub=v;change()},'sub'));
  g1.appendChild(fld('CTA',f.cta,v=>{f.cta=v;change()},0,0,'cta'));
  const emo=document.createElement('div');emo.className='emobar';
  '👉 👇 🔥 ✅ 🚀 💡 📈 ⚡ 🎯 ❤️ 🙌 ✨ 💜 ⚽ 🏆 📱'.split(' ').forEach(e=>{const b=document.createElement('button');b.type='button';b.className='emob';b.textContent=e;b.onclick=()=>insEmoji(e);emo.appendChild(b)});
  g1.appendChild(emo);
  const rowpc=document.createElement('div');rowpc.className='row';rowpc.style.marginTop='8px';
  const pg=fld('Paginação',f.page,v=>{f.page=v;change()},0,0,'page');pg.style.flex='1';rowpc.appendChild(pg);
  c.appendChild(g1);
  const chk=document.createElement('label');chk.className='chk';chk.style.marginTop='8px';
  chk.innerHTML='<input type=checkbox '+(f.chip?'checked':'')+'> Mostrar selo (chip da capa)';
  chk.querySelector('input').onchange=e=>{f.chip=e.target.checked;change()};g1.appendChild(chk);

  // FUNDO
  const g2=document.createElement('div');g2.className='grp';g2.innerHTML='<h5>Fundo</h5>';
  const seg=document.createElement('div');seg.className='seg';
  [['imagem','Imagem'],['escuro','Escuro'],['claro','Claro'],['degrade','Degradê'],['cor','Cor']].forEach(([k,lb])=>{
    const b=document.createElement('button');b.textContent=lb;if((f.bgmode||'imagem')===k)b.classList.add('on');
    b.onclick=()=>{f.bgmode=k;renderCtrl();change()};seg.appendChild(b);
  });
  g2.appendChild(seg);
  const mode=f.bgmode||'imagem';
  if(mode==='imagem'){
    if(f.bg){const im=document.createElement('img');im.className='bgthumb';im.src='/'+f.bg+'?t='+(f._v||0);g2.appendChild(im)}
    const up=document.createElement('div');up.style.marginTop='6px';up.innerHTML='<label>Trocar fundo (upload)</label>';
    const fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.style.cssText='font-size:12px;color:var(--sub)';
    fi.onchange=e=>upload(e.target.files[0]);up.appendChild(fi);g2.appendChild(up);
    // ajuste da imagem
    g2.appendChild(slider('Zoom da imagem: '+(f.zoom||1).toFixed(2)+'x',(f.zoom||1),1,2.5,0.05,(v,l)=>{f.zoom=v;l.textContent='Zoom da imagem: '+v.toFixed(2)+'x';touch()}));
    g2.appendChild(slider('Posição horizontal',(f.posx==null?50:f.posx),0,100,1,v=>{f.posx=v;touch()}));
    g2.appendChild(slider('Posição vertical',(f.posy==null?50:f.posy),0,100,1,v=>{f.posy=v;touch()}));
    // brilho / contraste / saturação
    g2.appendChild(slider('Brilho: '+Math.round((f.brilho||1)*100)+'%',(f.brilho||1),0.4,1.8,0.05,(v,l)=>{f.brilho=v;l.textContent='Brilho: '+Math.round(v*100)+'%';touch()}));
    g2.appendChild(slider('Contraste: '+Math.round((f.contraste||1)*100)+'%',(f.contraste||1),0.4,1.8,0.05,(v,l)=>{f.contraste=v;l.textContent='Contraste: '+Math.round(v*100)+'%';touch()}));
    g2.appendChild(slider('Saturação: '+Math.round((f.satur||1)*100)+'%',(f.satur||1),0,2,0.05,(v,l)=>{f.satur=v;l.textContent='Saturação: '+Math.round(v*100)+'%';touch()}));
    // camada por cima
    const ol=document.createElement('div');ol.style.marginTop='10px';ol.innerHTML='<label>Camada por cima da imagem</label>';
    const os=document.createElement('div');os.className='seg';
    [['none','Nenhuma'],['branco','Degradê branco'],['roxo','Degradê roxo'],['todo-branco','Todo branco'],['todo-roxo','Todo roxo']].forEach(([k,lb])=>{
      const b=document.createElement('button');b.textContent=lb;if((f.overlay||'none')===k)b.classList.add('on');
      b.onclick=()=>{f.overlay=k;renderCtrl();change()};os.appendChild(b)});
    ol.appendChild(os);g2.appendChild(ol);
    if((f.overlay||'none')!=='none')
      g2.appendChild(slider('Opacidade da camada: '+Math.round((f.overlay_op==null?.85:f.overlay_op)*100)+'%',(f.overlay_op==null?.85:f.overlay_op),0,1,0.05,(v,l)=>{f.overlay_op=v;l.textContent='Opacidade da camada: '+Math.round(v*100)+'%';touch()}));
    if(['branco','roxo'].includes(f.overlay||'')){
      g2.appendChild(slider('Rotação do degradê: '+(f.ov_ang==null?180:f.ov_ang)+'°',(f.ov_ang==null?180:f.ov_ang),0,360,5,(v,l)=>{f.ov_ang=v;l.textContent='Rotação do degradê: '+v+'°';touch()}));
      g2.appendChild(slider('Mover o degradê: '+(f.ov_pos==null?20:f.ov_pos)+'%',(f.ov_pos==null?20:f.ov_pos),0,90,2,(v,l)=>{f.ov_pos=v;l.textContent='Mover o degradê: '+v+'%';touch()}));
    }
    // gerar por IA
    const reg=document.createElement('div');reg.style.marginTop='12px';reg.innerHTML='<label>Gerar fundo por IA</label>';
    const selm=document.createElement('select');selm.className='regsel';
    [['claro','Tom claro (padrão)'],['escuro','Tom escuro']].forEach(([v,lb])=>{const o=document.createElement('option');o.value=v;o.textContent=lb;if((f._regtema||'claro')===v)o.selected=true;selm.appendChild(o)});
    selm.onchange=()=>f._regtema=selm.value;reg.appendChild(selm);
    const selt=document.createElement('select');selt.className='regsel';
    TIPOS.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent='conceito: '+t;if((f._tipo||'manifesto')===t)o.selected=true;selt.appendChild(o)});
    selt.onchange=()=>f._tipo=selt.value;reg.appendChild(selt);
    const rb=document.createElement('button');rb.className='btn ai';rb.textContent='✨ Regerar fundo IA (pago ~40s)';
    rb.onclick=()=>regen(rb);reg.appendChild(rb);
    // CONSISTÊNCIA: referência de estilo (outro slide) + contexto
    const ctxw=document.createElement('div');ctxw.style.marginTop='12px';ctxw.innerHTML='<label>Consistência — gerar mantendo o estilo de um slide</label>';
    const rsel=document.createElement('select');rsel.className='regsel';
    const o0=document.createElement('option');o0.value='';o0.textContent='referência: esta imagem (atual)';rsel.appendChild(o0);
    D.posts.forEach((pp,pi)=>{(pp.frames||[]).forEach((ff,fi)=>{if(ff.bgmode==='imagem'&&ff.bg){
      const o=document.createElement('option');o.value=ff.bg;o.textContent='ref: '+((pp.titulo||pp.slug).slice(0,16))+' · frame '+(fi+1);
      if(f._ref===ff.bg)o.selected=true;rsel.appendChild(o)}})});
    rsel.onchange=()=>f._ref=rsel.value;ctxw.appendChild(rsel);
    const cta2=document.createElement('textarea');cta2.rows=2;cta2.placeholder='contexto do novo slide (ex.: o Téo entrando em campo, mesma luz e composição da referência)';cta2.value=f.contexto||'';
    cta2.oninput=()=>{f.contexto=cta2.value;setDirty(true)};ctxw.appendChild(cta2);reg.appendChild(ctxw);
    const rb2=document.createElement('button');rb2.className='btn ai';rb2.style.marginTop='6px';rb2.textContent='✨ Gerar mantendo a referência + contexto (pago)';
    rb2.onclick=()=>{const rf=f._ref||f.bg;if(!rf){toast('Escolha um slide de referência (ou tenha uma imagem no fundo)');return}regen(rb2,rf)};reg.appendChild(rb2);
    const hintp=document.createElement('div');hintp.className='mini';hintp.style.marginTop='6px';
    hintp.textContent='Escolha o slide-modelo (ex.: a Nina) + o contexto do novo (ex.: o Téo). A IA mantém luz, cor e composição da referência.';
    reg.appendChild(hintp);g2.appendChild(reg);
  }else if(mode==='cor'){
    const cw=document.createElement('div');cw.className='row';cw.style.marginTop='8px';
    cw.innerHTML='<label style=margin:0>Cor do fundo</label>';
    const col=document.createElement('input');col.type='color';col.value=f.cor||'#F4F2FB';
    col.oninput=()=>{f.cor=col.value;change()};cw.appendChild(col);g2.appendChild(cw);
  }
  // tema do texto (vale p/ imagem e cor)
  if(mode==='imagem'||mode==='cor'){
    const tw=document.createElement('div');tw.style.marginTop='10px';tw.innerHTML='<label>Tema do texto (contraste)</label>';
    const ts=document.createElement('div');ts.className='seg';
    [['escuro','Texto claro (fundo escuro)'],['claro','Texto escuro (fundo claro)']].forEach(([k,lb])=>{
      const b=document.createElement('button');b.textContent=lb;if((f.tema||'escuro')===k)b.classList.add('on');
      b.onclick=()=>{f.tema=k;renderCtrl();change()};ts.appendChild(b);
    });tw.appendChild(ts);g2.appendChild(tw);
  }
  c.appendChild(g2);

  // ESTILO
  const g3=document.createElement('div');g3.className='grp';g3.innerHTML='<h5>Estilo</h5>';
  const ac=document.createElement('div');ac.className='row';ac.innerHTML='<label style=margin:0;flex:1>Cor de acento (palavra em *)</label>';
  const acol=document.createElement('input');acol.type='color';acol.value=f.accent||'#8b3cf7';
  acol.oninput=()=>{f.accent=acol.value;change()};ac.appendChild(acol);g3.appendChild(ac);
  const hs=document.createElement('div');hs.style.marginTop='10px';
  hs.innerHTML='<label>Tamanho do título: '+(f.hsize?f.hsize+'px':'automático')+'</label>';
  const rg=document.createElement('input');rg.type='range';rg.min=0;rg.max=140;rg.value=f.hsize||0;
  rg.oninput=()=>{f.hsize=+rg.value;hs.querySelector('label').textContent='Tamanho do título: '+(f.hsize?f.hsize+'px':'automático');clearTimeout(tmr);tmr=setTimeout(preview,120);setDirty(true)};
  hs.appendChild(rg);g3.appendChild(hs);
  const gr=document.createElement('label');gr.className='chk';gr.style.marginTop='10px';
  gr.innerHTML='<input type=checkbox '+(f.grade!==false?'checked':'')+'> Grade de acabamento (duotone+grão)';
  gr.querySelector('input').onchange=e=>{f.grade=e.target.checked;change()};g3.appendChild(gr);
  c.appendChild(g3);

  // ASSINATURA (bundle) — respeita o padrão da marca; se editar, prevalece
  const g5=document.createElement('div');g5.className='grp';g5.innerHTML='<h5>Assinatura (rodapé)</h5>';
  g5.appendChild(fld('Handle esquerdo (vazio = padrão da marca)',f.handle||'',v=>{f.handle=v;change()},0,0,'handle'));
  g5.appendChild(fld('Crédito direito (vazio = padrão do sistema)',f.rodape||'',v=>{f.rodape=v;change()},0,0,'rodape'));
  c.appendChild(g5);

  // AÇÕES
  const g4=document.createElement('div');g4.className='grp acts';g4.innerHTML='<h5>Exportar</h5>';
  const e1=document.createElement('button');e1.className='btn go';e1.textContent='⬇ Exportar este frame (PNG final)';e1.onclick=()=>exportar(e1,FI);g4.appendChild(e1);
  const e2=document.createElement('button');e2.className='btn';e2.textContent='⬇ Exportar o carrossel todo';e2.onclick=()=>exportar(e2,'all');g4.appendChild(e2);
  g4.appendChild(Object.assign(document.createElement('div'),{className:'mini',textContent:'O export roda o compositor real em alta (2x) e grava no arquivo do post.'}));
  c.appendChild(g4);
  applyCollapse();
}

function change(){markDraft();renderStrip();clearTimeout(tmr);tmr=setTimeout(preview,90);setDirty(true)}
function touch(){markDraft();clearTimeout(tmr);tmr=setTimeout(preview,90);setDirty(true)}
function slider(label,val,min,max,step,onin){
  const w=document.createElement('div');w.style.marginTop='8px';
  const lab=document.createElement('label');lab.textContent=label;w.appendChild(lab);
  const r=document.createElement('input');r.type='range';r.min=min;r.max=max;r.step=step;r.value=val;
  r.oninput=()=>onin(+r.value,lab);w.appendChild(r);return w;
}
async function moveCard(dir){
  const fr=post().frames,j=FI+dir;if(j<0||j>=fr.length)return;
  [fr[FI],fr[j]]=[fr[j],fr[FI]];await salvar(true);await reload(PI,j);toast('Ordem alterada');
}
const COLLAPSED=new Set();
const SEL=new Set();
function applyCollapse(){
  document.querySelectorAll('#ctrl .grp').forEach(g=>{
    const h=g.querySelector('h5');if(!h)return;const key=h.textContent.replace(/[▾▸]/g,'').trim();
    if(COLLAPSED.has(key))g.classList.add('collapsed');
    h.onclick=()=>{g.classList.toggle('collapsed');g.classList.contains('collapsed')?COLLAPSED.add(key):COLLAPSED.delete(key)};
  });
}

async function preview(){
  const r=await fetch('/preview',{method:'POST',headers:HJSON,
    body:JSON.stringify({frame:frame(),size:post().size,marca:post().marca||'smark'})});
  const html=await r.text();
  $('#pv').srcdoc=html;
  fit();
}
function fit(){
  const box=$('#fbox'),stage=box.parentElement;
  const availW=stage.clientWidth-36, availH=stage.clientHeight-36;
  const s=Math.min(availW/1080, availH/1350);
  $('#pv').style.transform='scale('+s+')';
  box.style.width=(1080*s)+'px';box.style.height=(1350*s)+'px';
}
window.addEventListener('resize',fit);
function attachWysiwyg(){
  const fr=$('#pv');let doc;try{doc=fr.contentDocument}catch(e){return}if(!doc||!doc.body)return;
  if(!doc.getElementById('wys')){const st=doc.createElement('style');st.id='wys';
    st.textContent='.h,.sub,.cta,.page,.footer>div{cursor:pointer}.h:hover,.sub:hover,.cta:hover,.page:hover,.footer>div:hover{outline:2px dashed #8b3cf7;outline-offset:4px}';
    (doc.head||doc.body).appendChild(st)}
  const wire=(sel,field)=>{const el=doc.querySelector(sel);if(el)el.onclick=e=>{e.stopPropagation();focusField(field)}};
  wire('.h','headline');wire('.sub','sub');wire('.cta','cta');wire('.page','page');
  const fs=doc.querySelectorAll('.footer>div');if(fs[0])fs[0].onclick=()=>focusField('handle');
  const cred=doc.querySelector('.footer .cred');if(cred)cred.onclick=()=>focusField('rodape');
}
function focusField(field){
  const el=document.getElementById('fld_'+field);if(!el){toast('Esse elemento não é editável por aqui');return}
  const g=el.closest('.grp');if(g)g.classList.remove('collapsed');
  el.scrollIntoView({block:'center',behavior:'smooth'});el.focus();
  el.style.boxShadow='0 0 0 2px var(--rox)';setTimeout(()=>{el.style.boxShadow=''},1000);
}
$('#pv').addEventListener('load',attachWysiwyg);

async function salvar(silent){
  await fetch('/salvar',{method:'POST',headers:HJSON,body:JSON.stringify({dados:D})});
  setDirty(false);if(!silent)toast('Salvo');
}
function markDraft(){if(D&&D.posts[PI])D.posts[PI].status='rascunho'}
$('#bsave').onclick=async()=>{if(post())post().status='salvo';await salvar(true);renderPosts();toast('Salvo — finalizado ✓')};
// auto-save de estado a cada 30s (mantém status rascunho até salvar final)
setInterval(()=>{if(dirty){salvar(true);toast('Auto-salvo (rascunho)')}},30000);

async function exportar(btn,scope){
  btn.disabled=true;const old=btn.textContent;btn.textContent='Exportando…';
  await salvar(true);
  const r=await(await fetch('/exportar',{method:'POST',headers:HJSON,
    body:JSON.stringify({post:PI,frame:scope})})).json();
  btn.disabled=false;btn.textContent=old;
  if(r.ok){post().frames.forEach(f=>f._v=(f._v||0)+1);renderStrip();renderCtrl();toast('Exportado: '+r.feitas.length+' PNG');}
  else toast('Erro no export: '+(r.erro||''));
}

async function upload(file){
  if(!file)return;const rd=new FileReader();
  rd.onload=async()=>{
    toast('Enviando imagem…');
    const r=await(await fetch('/upload',{method:'POST',headers:HJSON,
      body:JSON.stringify({slug:post().slug,marca:post().marca||'smark',dataurl:rd.result})})).json();
    if(r.ok){const f=frame();f.bgmode='imagem';f.bg=r.path;f._v=(f._v||0)+1;renderCtrl();change();toast('Fundo trocado');}
    else toast('Erro no upload: '+(r.erro||''));
  };rd.readAsDataURL(file);
}

async function regen(btn,ref){
  const f=frame(),tema=f._regtema||'claro',tipo=f._tipo||'manifesto',ctx=(f.contexto||'').trim();
  const msg=ref?('Gerar mantendo o ESTILO da referência (luz, cor, composição)'+(ctx?(', com o contexto:\n"'+ctx+'"'):' — sem contexto')+'\n\n(pago · ~40s)')
                :('Gerar fundo por IA?\n\n• Tom: '+tema+'\n• Conceito: '+tipo+'\n\n(pago · ~40s)');
  if(!confirm(msg))return;
  btn.disabled=true;const old=btn.textContent;btn.textContent='Gerando…';toast('Gerando por IA (pago)…');
  const r=await(await fetch('/regerar-fundo',{method:'POST',headers:HJSON,
    body:JSON.stringify({post:PI,frame:FI,tipo:tipo,tema:tema,ref:ref||'',prompt:ctx})})).json();
  btn.disabled=false;btn.textContent=old;
  if(r.ok){f.bgmode='imagem';f.bg=r.path;if(r.tema&&!ref)f.tema=r.tema;f._v=(f._v||0)+1;renderCtrl();change();toast('Imagem gerada');}
  else toast('Erro: '+(r.erro||''));
}

async function igPreview(){
  const p=post(),fr=p.frames[IG];

function openSim(){
  IG=FI;const p=post();
  const m=document.getElementById('igmodal');
  const dots=p.frames.map((_,i)=>'<span class="igdot" data-i="'+i+'"></span>').join('');
  m.innerHTML='<div class=igcard><div class=ighead><div class=igav></div><b>smark</b>'
    +'<span style="flex:1"></span><span>⋯</span></div>'
    +'<div class=igmedia><button class="ignav l" id=igprev>‹</button><iframe id=igframe></iframe>'
    +'<button class="ignav r" id=ignext>›</button><div class=igdots>'+dots+'</div></div>'
    +'<div class=igicons><span>♡</span><span>💬</span><span>➤</span><span style="flex:1"></span><span>🔖</span></div>'
    +'<div class=igcap><b>smark</b> <span id=igcaptxt></span></div>'
    +'<label style="color:#888;font-size:11px;margin:10px 14px 4px;display:block">Editar legenda</label>'
    +'<textarea id=igcapedit rows=6></textarea>'
    +'<div class=igbtns><button class=btn id=igclose>Fechar</button><button class="btn go" id=igsave>💾 Salvar legenda</button></div></div>';
  m.style.display='flex';
  const cap=p.caption||'';
  document.getElementById('igcapedit').value=cap;
  document.getElementById('igcaptxt').textContent=cap.slice(0,90)+(cap.length>90?'… mais':'');
  igPreview();
  document.getElementById('igprev').onclick=()=>{IG=(IG-1+p.frames.length)%p.frames.length;igPreview()};
  document.getElementById('ignext').onclick=()=>{IG=(IG+1)%p.frames.length;igPreview()};
  m.querySelectorAll('.igdot').forEach(d=>d.onclick=()=>{IG=+d.dataset.i;igPreview()});
  document.getElementById('igcapedit').oninput=e=>{p.caption=e.target.value;setDirty(true);
    document.getElementById('igcaptxt').textContent=e.target.value.slice(0,90)+(e.target.value.length>90?'…':'')};
  document.getElementById('igclose').onclick=()=>m.style.display='none';
  document.getElementById('igsave').onclick=async()=>{await salvar(true);toast('Legenda salva')};
  m.onclick=e=>{if(e.target===m)m.style.display='none'};
}

// novo post / adicionar / excluir card
function newFrame(){return {headline:'NOVO|*CARD.*',sub:'',cta:'',page:'',chip:false,tema:'claro',bgmode:'claro',bg:'',cor:'#F4F2FB',accent:'',hsize:0,grade:true}}
async function reload(pi,fi){D=await(await fetch('/dados')).json();sel(pi,fi)}
async function addCard(){post().frames.splice(FI+1,0,newFrame());await salvar(true);await reload(PI,FI+1);toast('Card adicionado')}
async function delCard(){
  if(post().frames.length<=1){toast('O post precisa de pelo menos 1 card');return}
  if(!confirm('Excluir este card do post?'))return;
  post().frames.splice(FI,1);await salvar(true);await reload(PI,Math.max(0,FI-1));toast('Card excluído');
}
async function novoPost(){
  const t=prompt('Título do novo post:','Novo post');if(t===null)return;
  const m=(prompt('Marca? (smark / provider-max / elever-ai)','smark')||'smark').trim();
  const r=await(await fetch('/novo-post',{method:'POST',headers:HJSON,body:JSON.stringify({titulo:t,slug:t,marca:m})})).json();
  if(r.ok){await reload(r.index,0);toast('Post criado ('+r.slug+')')}else toast('Erro ao criar post');
}
$('#bnew').onclick=novoPost;$('#baddc').onclick=addCard;$('#bdelc').onclick=delCard;
$('#bmvl').onclick=()=>moveCard(-1);$('#bmvr').onclick=()=>moveCard(1);$('#bsim').onclick=openSim;
$('#bdup').onclick=dupPost;$('#bdelpost').onclick=delSelected;

carregar();
