<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Lançamento · Grupo Smark</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Archivo',sans-serif}
body{background:#0B0B0B;color:#EAEAF0}
.nav{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#15121f,#0d0b14);border-bottom:1px solid rgba(255,255,255,.1);padding:16px 28px;display:flex;align-items:center;gap:22px}
.nav h1{font-family:'Anton';font-size:24px;letter-spacing:1px;text-transform:uppercase;margin-right:auto}
.nav a{color:#9a93ad;text-decoration:none;font-weight:700;font-size:14px;padding:7px 14px;border-radius:9px}
.nav a.on{background:#8B3CF7;color:#fff}
.brands{display:flex;gap:8px;padding:18px 28px 4px}
.bt{background:#15151c;border:1px solid rgba(255,255,255,.12);color:#cfcad8;border-radius:999px;padding:9px 18px;font-weight:800;cursor:pointer}
.bt.on{background:#8B3CF7;border-color:#8B3CF7;color:#fff}
.wrap{max-width:860px;margin:0 auto;padding:18px 16px 60px}
.profile{display:flex;gap:30px;align-items:center;padding:20px 8px 26px}
.av{width:120px;height:120px;border-radius:50%;background:linear-gradient(155deg,#9A4DFF,#2A1CA8);display:flex;align-items:center;justify-content:center;flex:none}
.pinfo .h{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.pinfo .hn{font-size:24px;font-weight:500}
.pinfo .stats{display:flex;gap:30px;margin-bottom:14px;font-size:15px;color:#cfcad8}
.pinfo .stats b{color:#fff}
.pinfo .bio{font-size:14px;color:#d6d2e2;line-height:1.5;max-width:520px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.cell{position:relative;aspect-ratio:1/1;background:#16151d center/cover no-repeat;cursor:pointer}
.cell:hover::after{content:"";position:absolute;inset:0;background:rgba(139,60,247,.25)}
.cell .car{position:absolute;top:8px;right:8px;color:#fff;font-size:16px;filter:drop-shadow(0 1px 2px #000)}
.cell .badge{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px}
.hint{text-align:center;color:#6a6478;font-size:13px;padding:14px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.74);display:none;z-index:50;padding:24px;overflow:auto}
.ov.on{display:flex;align-items:center;justify-content:center}
.modal{background:#121119;border:1px solid rgba(255,255,255,.14);border-radius:18px;max-width:840px;width:100%;display:grid;grid-template-columns:360px 1fr;max-height:92vh;overflow:auto}
.modal img{width:100%;border-radius:18px 0 0 18px;display:block}
.modal .side{padding:24px 26px}
.modal .lab{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#8a83a0;font-weight:800;margin:14px 0 6px}
.modal .tipo{display:inline-block;background:#8B3CF7;color:#fff;font-weight:800;font-size:12px;border-radius:7px;padding:4px 10px}
.modal .cap{background:#0c0b12;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;white-space:pre-wrap;font-size:14px;line-height:1.55;color:#dcd7e8}
.x{position:fixed;top:24px;right:30px;font-size:30px;color:#fff;cursor:pointer;z-index:60}
@media(max-width:700px){.modal{grid-template-columns:1fr}.modal img{border-radius:18px 18px 0 0}.profile{flex-direction:column;text-align:center}}
</style></head><body>
<div class="nav"><h1>Grupo Smark</h1><a href="http://localhost:8765/painel">Conteúdo</a><a href="http://localhost:8765/vitrine" class="on">Vitrine</a><a href="http://localhost:8765/editor">✎ Editor</a></div>

<script>
const D = {"marcas": {"smark": {"handle": "@smark", "bio": "Sua empresa com IA em cada departamento. Pré-vendas, prospecção, receita e CS no automático. Nina, Téo e Clara — conheça suas contratações 👇", "sym": "<svg viewBox=\"0 0 100 100\" width=\"46\" height=\"46\"><path fill-rule=\"evenodd\" fill=\"#fff\" d=\"M50 7 L86 90 L50 58 L14 90 Z M41 46 a9 9 0 1 0 18 0 a9 9 0 1 0 -18 0 Z\"/></svg>", "recs": [{"n": 1, "tipo": "chegada", "headline": "SUA PRÓXIMA|CONTRATAÇÃO NÃO|PRECISA DE *CURRÍCULO.*", "sub": "Nem salário, nem treinamento de 3 meses.", "cta": "", "tema": "escuro", "formato": "carrossel", "caption": "[Carrossel 3 frames] A parte mais cara de crescer uma empresa não é o salário. É o tempo e o risco de cada contratação.\n\nE se algumas funções da sua empresa não precisassem passar por isso?\n\nEssa semana a gente te apresenta um jeito diferente de resolver. Salva e acompanha. 👇", "status": "rascunho", "thumb": "marcas/smark/publicacoes/social/instagram/arte/contratacao-sem-curriculo/01.png", "slug": "contratacao-sem-curriculo", "frames": 3}, {"n": 2, "tipo": "dados de mercado", "headline": "USAR IA VIROU|*DECISÃO DE|ESTRATÉGICA.*", "sub": "NÃO É. — Dados de mercado 👉", "cta": "", "tema": "escuro", "formato": "carrossel", "caption": "[Carrossel 6 frames] Quando um movimento sai do grupo dos \"inovadores\" e vira maioria, ele deixa de ser aposta e passa a ser gestão.\n\nOs números de Stanford, McKinsey e Harvard/BCG mostram a mesma coisa por ângulos diferentes: IA na operação não é mais tendência distante — é decisão que empresas sérias já estão tomando.\n\nE repare no ponto que quase ninguém comenta: nenhum desses estudos fala em substituir pessoas. Todos falam em fazer o mesmo time produzir mais e melhor.\n\nA pergunta, então, não é mais \"devo usar IA?\". É \"por onde eu começo?\".\n\nSalva esse post — e quando quiser responder essa pergunta pra sua empresa, o diagnóstico gratuito está no link da bio. 👇", "status": "rascunho", "thumb": "marcas/smark/publicacoes/social/instagram/arte/_lancamento/02.png", "slug": "mercado-virou-a-chave", "frames": 6}, {"n": 3, "tipo": "a seleção", "headline": "A SMARK SELECIONOU|3 PROFISSIONAIS PRA|*SUA EMPRESA.*", "sub": "Nenhum deles vai pedir demissão. 👇", "cta": "", "tema": "escuro", "formato": "carrossel", "caption": "[Carrossel 5 frames] Apresentando a seleção da smark. 👋\n\nNão são robôs de \"aperte 1\". São funções inteiras da sua empresa, cobertas por IA que trabalha na mão do seu time — não no lugar dele.\n\nQual dessas áreas mais dói na sua operação hoje? Comenta. 👇", "status": "rascunho", "thumb": "marcas/smark/publicacoes/social/instagram/arte/selecao-nina-teo-clara/01.png", "slug": "selecao-nina-teo-clara", "frames": 5}, {"n": 4, "tipo": "case (PENDENTE dado real)", "headline": "[RESULTADO GRANDE]|O CASE DE *[CLIENTE].*", "sub": "⚠️ Pendente — precisa do número real do case.", "cta": "", "tema": "escuro", "formato": "carrossel", "caption": "[Carrossel 5 frames] Prova não é a smark dizendo que funciona. É o cliente mostrando o que mudou.\n\n[1-2 frases com o número principal do case.]\n\nO que essa empresa fez, a sua também pode fazer — e começa entendendo onde a IA se pagaria primeiro. Diagnóstico gratuito, link na bio. 👇", "status": "rascunho", "thumb": "marcas/smark/publicacoes/social/instagram/arte/_lancamento/case-pendente.png", "slug": "case-destaque", "frames": 5}, {"n": 5, "tipo": "fechamento", "headline": "3 MOTIVOS PRA TER|*FUNCIONÁRIOS|DE IA.*", "sub": "(nenhum deles é \"porque tá na moda\") 👇", "cta": "", "tema": "escuro", "formato": "carrossel", "caption": "[Carrossel 5 frames] Se você espera \"porque atende 24 horas\" nessa lista, vai se decepcionar.\n\nOs motivos reais pra colocar IA na sua empresa são de gestão: custo, produtividade e escala.\n\nO diagnóstico gratuito mostra qual desses três pesa mais na sua operação — e por onde começar. Link na bio. 👇", "status": "rascunho", "thumb": "marcas/smark/publicacoes/social/instagram/arte/3-motivos-funcionarios-ia/01.png", "slug": "3-motivos-funcionarios-ia", "frames": 5}]}, "provider-max": {"handle": "@providermax", "bio": "Um funcionário de IA que renova os contratos dos seus clientes — sozinho, dia e noite, sem você contratar mais gente. uma plataforma smark.", "sym": "<svg viewBox=\"0 0 100 100\" width=\"46\" height=\"46\" style=\"color:#fff\"><circle cx=\"50\" cy=\"71\" r=\"7\" fill=\"currentColor\"/><path d=\"M37 61 Q50 46 63 61\" stroke=\"currentColor\" stroke-width=\"9\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M27 52 Q50 27 73 52\" stroke=\"currentColor\" stroke-width=\"9\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M17 43 Q50 10 83 43\" stroke=\"currentColor\" stroke-width=\"9\" fill=\"none\" stroke-linecap=\"round\"/></svg>", "recs": [{"n": 1, "tipo": "manifesto", "headline": "FUNCIONÁRIOS DE IA|PRO SEU *PROVEDOR.*", "sub": "Esse é o Provider Max.", "cta": "ARRASTA →", "tema": "escuro", "formato": "carrossel", "caption": "Sua base já vale mais do que você fatura. Apresentamos os funcionários de IA que vão buscar essa receita.", "status": "rascunho", "thumb": "marcas/provider-max/publicacoes/social/instagram/arte/_lancamento/01.png"}, {"n": 2, "tipo": "herói", "headline": "SEU TIME NÃO DÁ|CONTA. A IA *DÁ.*", "sub": "Renovar, recuperar e fazer upgrade de 10 mil contratos.", "cta": "QUERO VER →", "tema": "escuro", "formato": "post", "caption": "Ninguém liga, renova e oferta upgrade pra 10 mil contratos, um a um, na hora certa. A IA dá conta.", "status": "rascunho", "thumb": "marcas/provider-max/publicacoes/social/instagram/arte/_lancamento/02.png"}, {"n": 3, "tipo": "núcleo", "headline": "A RECEITA JÁ ESTÁ|NA BASE. FALTA|QUEM *EXECUTE.*", "sub": "A Provider Max é o braço que executa.", "cta": "", "tema": "claro", "formato": "post", "caption": "Não é falta de estratégia. É falta de braço pra executar a base inteira. A gente é esse braço.", "status": "rascunho", "thumb": "marcas/provider-max/publicacoes/social/instagram/arte/_lancamento/03.png"}, {"n": 4, "tipo": "recuperação", "headline": "RECUPERA A BASE|ANTES DO *CHURN.*", "sub": "Cliente em risco, reativado no automático.", "cta": "", "tema": "escuro", "formato": "post", "caption": "Contrato vencido hoje é cancelamento amanhã. A IA age antes — recupera quem ia sair.", "status": "rascunho", "thumb": "marcas/provider-max/publicacoes/social/instagram/arte/_lancamento/04.png"}, {"n": 5, "tipo": "renovação", "headline": "RENOVA ANTES DE O|CLIENTE PENSAR|EM *SAIR.*", "sub": "Renovação não é sorte. É processo.", "cta": "", "tema": "claro", "formato": "post", "caption": "O Gestor de Renovações antecipa o vencimento e renova proativo — no WhatsApp, registrado no IXC.", "status": "rascunho", "thumb": "marcas/provider-max/publicacoes/social/instagram/arte/_lancamento/05.png"}, {"n": 6, "tipo": "upgrade", "headline": "SOBE O TICKET COM|UPGRADE NA *BASE.*", "sub": "A receita que já existe, capturada.", "cta": "", "tema": "escuro", "formato": "post", "caption": "Quem pode subir de plano? A IA acha e oferta na hora certa. ROI medível em 60–90 dias.", "status": "rascunho", "thumb": "marcas/provider-max/publicacoes/social/instagram/arte/_lancamento/06.png"}, {"n": 7, "tipo": "prova", "headline": "5× MAIS CARO|BUSCAR CLIENTE|*NOVO.*", "sub": "Sua base já vale mais do que você fatura.", "cta": "ARRASTA →", "tema": "claro", "formato": "carrossel", "caption": "Enquanto uns correm atrás de cliente novo (5x mais caro), os eficientes extraem a receita que já está na base.", "status": "rascunho", "thumb": "marcas/provider-max/publicacoes/social/instagram/arte/_lancamento/07.png"}, {"n": 8, "tipo": "integração", "headline": "INTEGRA NO SEU|IXC. SEM *PLANILHA.*", "sub": "Funcionários de IA que registram sozinhos.", "cta": "", "tema": "escuro", "formato": "post", "caption": "Sem virar projeto de TI. Os agentes conversam no WhatsApp e registram direto no seu IXC.", "status": "rascunho", "thumb": "marcas/provider-max/publicacoes/social/instagram/arte/_lancamento/08.png"}, {"n": 9, "tipo": "provoca", "headline": "ENQUANTO VOCÊ NÃO|AGE, O DINHEIRO|*SOME.*", "sub": "A IA age por você.", "cta": "", "tema": "claro", "formato": "post", "caption": "Cada dia parado é renovação perdida e upgrade não ofertado. O Provider Max age no seu lugar.", "status": "rascunho", "thumb": "marcas/provider-max/publicacoes/social/instagram/arte/_lancamento/09.png"}, {"n": 10, "tipo": "cta", "headline": "QUER VER NA SUA|*BASE?*", "sub": "Diagnóstico gratuito.", "cta": "DIAGNÓSTICO →", "tema": "escuro", "formato": "post", "caption": "Mostramos quanto de receita está parada na sua base — sem compromisso. Comenta BASE ou chama no direct.", "status": "rascunho", "thumb": "marcas/provider-max/publicacoes/social/instagram/arte/_lancamento/10.png"}]}, "elever-ai": {"handle": "@eleverai", "bio": "Um vendedor de IA no WhatsApp que atende seus clientes dia e noite — e nunca deixa ninguém sem resposta. Você só fecha. uma plataforma smark.", "sym": "<svg viewBox=\"0 0 100 100\" width=\"44\" height=\"44\"><path fill=\"#fff\" d=\"M50 4 C54 34 66 46 96 50 C66 54 54 66 50 96 C46 66 34 54 4 50 C34 46 46 34 50 4 Z\"/></svg>", "recs": [{"n": 1, "tipo": "manifesto", "headline": "Funcionaria de IA para sua loja.", "sub": "Esse é a Sara.", "cta": "Conheça →", "tema": "escuro", "formato": "carrossel", "caption": "Conheça a Sara, sua funcionaria de IA que atende sua loja  dia e noite.", "status": "rascunho", "thumb": "marcas/elever-ai/publicacoes/social/instagram/arte/_lancamento/01.png"}, {"n": 2, "tipo": "núcleo", "headline": "ATENDE DE DIA.|ATENDE DE *NOITE.*", "sub": "Responde todo lead na hora — e não tira férias.", "cta": "QUERO VER →", "tema": "claro", "formato": "post", "caption": "Um funcionário de IA que atende cada lead na hora, qualifica e entrega pronto. Você só fecha.", "status": "rascunho", "thumb": "marcas/elever-ai/publicacoes/social/instagram/arte/_lancamento/02.png"}, {"n": 3, "tipo": "dor", "headline": "ELE CHAMOU 22H.|VOCÊ RESPONDEU|*AMANHÃ.*", "sub": "Lead de noite também é venda.", "cta": "", "tema": "escuro", "formato": "post", "caption": "O cliente chama 22h, no domingo, na madrugada. De manhã ele já fechou com quem respondeu. A IA cobre esse turno.", "status": "rascunho", "thumb": "marcas/elever-ai/publicacoes/social/instagram/arte/_lancamento/03.png"}, {"n": 4, "tipo": "dor", "headline": "LEAD DE DOMINGO|TAMBÉM É *VENDA.*", "sub": "O cliente não some — só foi atendido em outro lugar.", "cta": "", "tema": "claro", "formato": "post", "caption": "Quem responde primeiro leva. A IA responde na hora, todo dia, toda hora.", "status": "rascunho", "thumb": "marcas/elever-ai/publicacoes/social/instagram/arte/_lancamento/04.png"}, {"n": 5, "tipo": "follow-up", "headline": "AQUELE ORÇAMENTO|QUE VIROU|*SILÊNCIO.*", "sub": "A IA puxa o papo de volta no tempo certo.", "cta": "", "tema": "escuro", "formato": "post", "caption": "O dinheiro está no follow-up. E ninguém tem tempo de lembrar de cada cliente, um por um. A IA tem.", "status": "rascunho", "thumb": "marcas/elever-ai/publicacoes/social/instagram/arte/_lancamento/05.png"}, {"n": 6, "tipo": "divisão", "headline": "VOCÊ FECHA.|A IA *ATENDE.*", "sub": "A IA faz o trabalho chato; você faz a venda.", "cta": "", "tema": "claro", "formato": "post", "caption": "Não é robô que substitui o time. É quem atende, qualifica e lembra — pra seu vendedor focar em fechar.", "status": "rascunho", "thumb": "marcas/elever-ai/publicacoes/social/instagram/arte/_lancamento/06.png"}, {"n": 7, "tipo": "velocidade", "headline": "QUEM RESPONDE|PRIMEIRO, *FECHA.*", "sub": "Lead quente esfria em minutos.", "cta": "", "tema": "escuro", "formato": "post", "caption": "Cada minuto de demora é conversão que escorre. A IA responde no segundo em que o lead chega.", "status": "rascunho", "thumb": "marcas/elever-ai/publicacoes/social/instagram/arte/_lancamento/07.png"}, {"n": 8, "tipo": "nicho", "headline": "CLIENTE SUMIU DEPOIS|DO *ORÇAMENTO?*", "sub": "A IA atende na hora e não esquece ninguém.", "cta": "", "tema": "escuro", "formato": "post", "caption": "Móvel, plano, projeto — venda que demora pede follow-up. A IA faz por você, sem você correr atrás.", "status": "rascunho", "thumb": "marcas/elever-ai/publicacoes/social/instagram/arte/_lancamento/08.png"}, {"n": 9, "tipo": "antimedo", "headline": "NÃO É ROBÔ. É UM|FUNCIONÁRIO DE *IA.*", "sub": "Atende como gente, na hora, 24h.", "cta": "", "tema": "claro", "formato": "post", "caption": "Esquece o chatbot travado. É um atendimento que conversa de verdade — e não dorme.", "status": "rascunho", "thumb": "marcas/elever-ai/publicacoes/social/instagram/arte/_lancamento/09.png"}, {"n": 10, "tipo": "cta", "headline": "QUER UM FUNCIONÁRIO|QUE NÃO *FALTA?*", "sub": "Diagnóstico gratuito.", "cta": "DIAGNÓSTICO →", "tema": "escuro", "formato": "post", "caption": "Mostramos como a IA atende seus leads dia e noite. Comenta EU QUERO ou chama no direct.", "status": "rascunho", "thumb": "marcas/elever-ai/publicacoes/social/instagram/arte/_lancamento/10.png"}]}}};
const NOME={"smark":"smark","provider-max":"providermax","elever-ai":"eleverai"};
let cur="smark";
function tabs(){const el=document.getElementById("brands");el.innerHTML="";
  Object.keys(D.marcas).forEach(m=>{const b=document.createElement("span");b.className="bt"+(m===cur?" on":"");
    b.textContent=({"smark":"smark","provider-max":"Provider Max","elever-ai":"Elever AI"})[m];
    b.onclick=()=>{cur=m;tabs();view();};el.appendChild(b);});}
function view(){const o=D.marcas[cur],w=document.getElementById("wrap");
  const cells=o.recs.map((r,i)=>`<div class="cell" style="background-image:url('${encodeURI(r.thumb)}')" onclick="abrir(${i})">
    ${r.formato==="carrossel"?'<span class="car">▦</span>':''}<span class="badge">${r.tipo}</span></div>`).join("");
  w.innerHTML=`<div class="profile"><div class="av">${o.sym}</div><div class="pinfo">
    <div class="h"><span class="hn">${o.handle.replace('@','')}</span></div>
    <div class="stats"><span><b>10</b> publicações</span><span><b>—</b> seguidores</span><span><b>—</b> seguindo</span></div>
    <div class="bio">${o.bio}</div></div></div>
    <div class="grid">${cells}</div>
    <div class="hint">Simulação (fundo placeholder, sem gastar API). Clique numa arte pra ver a copy e aprovar.</div>`;}
function abrir(i){const r=D.marcas[cur].recs[i],m=document.getElementById("modal");
  m.innerHTML=`<img src="${encodeURI(r.thumb)}"><div class="side">
    <span class="tipo">${r.tipo}</span> &nbsp;<span style="color:#8a83a0;font-size:12px">${r.formato} · ${r.tema}</span>
    <div class="lab">Legenda Instagram (rascunho)</div><div class="cap">${r.caption}</div>
    <div class="lab">Status</div><div class="cap">Aguardando sua aprovação. Diga "aprovo ${cur} ${r.n}" ou peça ajuste na copy.</div>
  </div>`;document.getElementById("ov").classList.add("on");}
function fechar(){document.getElementById("ov").classList.remove("on");}
document.getElementById("ov").onclick=e=>{if(e.target.id==="ov")fechar();};
tabs();view();
</script></body></html>
